<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R6 Tournament Hub</title>

<style>
    :root {
        --bg-main: #08090a;
        --bg-card: rgba(17, 18, 22, 0.88);
        --bg-input: #17181d;
        --accent: #e74c3c;
        --accent-hover: #c0392b;
        --text-main: #f5f6fa;
        --text-muted: #718093;
        --border: #2c2d35;
        --success: #2ecc71;
        --danger: #e74c3c;
        
        /* Podium Colors */
        --gold: #f1c40f;
        --silver: #bdc3c7;
        --bronze: #e67e22;
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: var(--bg-main);
        color: var(--text-main);
        line-height: 1.6;
        padding: 20px;
        overflow-x: hidden;
        position: relative;
        min-height: 100vh;
    }

    /* Animated Particle Canvas */
    #bg-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -1;
        pointer-events: none;
    }

    .container {
        max-width: 1200px;
        margin: 0 auto;
        position: relative;
        z-index: 1;
    }

    header {
        margin-bottom: 30px;
        border-bottom: 2px solid var(--border);
        padding-bottom: 20px;
        animation: fadeInDown 0.6s ease-out;
    }

    h1 {
        color: var(--accent);
        font-size: 2.5rem;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 15px;
        font-weight: 800;
        text-shadow: 0 0 15px rgba(231, 76, 60, 0.4);
    }

    /* Controls & Buttons */
    .nav-buttons, .sort-buttons {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-bottom: 15px;
        flex-wrap: wrap;
    }

    button {
        padding: 10px 20px;
        background: var(--accent);
        color: #fff;
        border: none;
        cursor: pointer;
        font-weight: bold;
        text-transform: uppercase;
        font-size: 0.85rem;
        letter-spacing: 1px;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        border-radius: 4px;
    }

    button:active {
        transform: scale(0.95);
        filter: brightness(0.9);
    }

    button:hover {
        background: var(--accent-hover);
        box-shadow: 0 0 12px rgba(231, 76, 60, 0.5);
    }

    button.secondary {
        background: var(--bg-input);
        color: var(--text-main);
        border: 1px solid var(--border);
    }

    button.secondary:hover {
        background: var(--border);
        box-shadow: 0 0 12px rgba(255, 255, 255, 0.05);
    }

    button.danger {
        background: #95a5a6;
        color: #fff;
    }
    
    button.danger:hover {
        background: var(--danger);
        box-shadow: 0 0 12px rgba(231, 76, 60, 0.4);
    }

    input {
        padding: 10px 14px;
        background: var(--bg-input);
        border: 1px solid var(--border);
        color: white;
        border-radius: 4px;
        font-size: 0.9rem;
        transition: all 0.2s ease;
    }

    input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 8px rgba(231, 76, 60, 0.2);
        background: #20222a;
    }

    /* Panel Panels */
    .view-panel {
        background: var(--bg-card);
        padding: 25px;
        border-radius: 8px;
        box-shadow: 0 10px 35px rgba(0,0,0,0.8);
        border: 1px solid var(--border);
        margin-top: 20px;
        backdrop-filter: blur(8px);
        animation: fadeInUp 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    h2 {
        font-size: 1.5rem;
        margin-bottom: 20px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #fff;
        border-left: 4px solid var(--accent);
        padding-left: 10px;
        text-align: left;
    }

    .add-player-form {
        display: flex;
        gap: 10px;
        margin-bottom: 25px;
        justify-content: flex-start;
    }

    /* Tables */
    .table-container {
        overflow-x: auto;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
        text-align: left;
    }

    th, td {
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
        font-size: 0.95rem;
    }

    th {
        background: rgba(10, 11, 13, 0.95);
        color: var(--text-muted);
        text-transform: uppercase;
        font-size: 0.8rem;
        letter-spacing: 1px;
        font-weight: 700;
    }

    tbody tr {
        transition: all 0.2s ease;
    }

    tbody tr:hover {
        background: rgba(255, 255, 255, 0.02);
        transform: translateX(4px);
    }

    .row-fade {
        opacity: 0.3;
        transform: scale(0.98);
    }

    td input {
        width: 100%;
        padding: 6px 10px;
    }

    td input[type="number"] {
        width: 70px;
        text-align: center;
    }

    /* Podium Row Styling tags */
    .rank-1 { color: var(--gold) !important; font-weight: bold; text-shadow: 0 0 8px rgba(241, 196, 21, 0.3); }
    .rank-2 { color: var(--silver) !important; font-weight: bold; }
    .rank-3 { color: var(--bronze) !important; font-weight: bold; }

    #loginBox {
        max-width: 350px;
        margin: 40px auto;
    }

    #loginBox input {
        width: 100%;
        margin-bottom: 15px;
        text-align: center;
    }

    #loginBox button {
        width: 100%;
    }

    #adminPanel { display: none; }
    #loginBox { display: none; }

    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInDown {
        from { opacity: 0; transform: translateY(-20px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
</head>

<body>

<canvas id="bg-canvas"></canvas>

<div class="container">
    <header>
        <h1>R6 Tournament Hub</h1>
        
        <div class="nav-buttons">
            <button onclick="showPublic()">Public Leaderboard</button>
            <button onclick="openLogin()" class="secondary">Admin Panel</button>
        </div>

        <div class="sort-buttons">
            <button onclick="handleSort('kd')" class="secondary">Sort by K/D</button>
            <button onclick="handleSort('win')" class="secondary">Sort by Win %</button>
        </div>
    </header>

    <div id="publicView" class="view-panel">
        <h2>Leaderboard</h2>
        <div class="table-container">
            <table>
                <thead>
                <tr>
                    <th>Rank</th>
                    <th>Player</th>
                    <th>Wins</th>
                    <th>Losses</th>
                    <th>Win %</th>
                    <th>Kills</th>
                    <th>Deaths</th>
                    <th>K/D</th>
                </tr>
                </thead>
                <tbody id="publicTable"></tbody>
            </table>
        </div>
    </div>

    <div id="loginBox" class="view-panel">
        <h2>Admin Login</h2>
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Access Database</button>
    </div>

    <div id="adminPanel" class="view-panel">
        <h2>Admin Panel</h2>
        
        <div class="add-player-form">
            <input id="name" placeholder="Player Name">
            <button onclick="addPlayer()">Add Player</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                <tr>
                    <th>Rank</th>
                    <th>Player</th>
                    <th>Wins</th>
                    <th>Losses</th>
                    <th>Kills</th>
                    <th>Deaths</th>
                    <th>Win %</th>
                    <th>K/D</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody id="adminTable"></tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
/* ================= FIREBASE ================= */
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
import {
    getFirestore,
    doc,
    setDoc,
    onSnapshot
} from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyCB88kRN8uPwJc8q_KcGqlmPA9rBCF58ro",
    authDomain: "r6-tourney.firebaseapp.com",
    projectId: "r6-tourney",
    storageBucket: "r6-tourney.firebasestorage.app",
    messagingSenderId: "348732226476",
    appId: "1:348732226476:web:dea6f1907aed3ddbc29809"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const DOC_REF = doc(db, "leaderboard", "players");

/* ================= STATE ================= */
const ADMIN_PASSWORD = "admin123";
let sortMode = "kd";
let players = [];

/* ================= REALTIME SYNC ================= */
onSnapshot(DOC_REF, (snap) => {
    if (snap.exists()) {
        players = snap.data().players || [];
    } else {
        players = [];
    }

    renderPublic();
    renderAdmin();
});

/* ================= SAVE ================= */
async function save() {
    await setDoc(DOC_REF, {
        players
    });
}

/* ================= SORT & ANIMATION ================= */
function handleSort(mode) {
    const activeTableBody = document.querySelector(
        document.getElementById("publicView").style.display !== "none" ? "#publicTable" : "#adminTable"
    );
    
    if (activeTableBody) {
        const rows = activeTableBody.querySelectorAll("tr");
        rows.forEach(row => row.classList.add("row-fade"));
    }

    setTimeout(() => {
        sortMode = mode;
        renderPublic();
        renderAdmin();
    }, 200);
}

function getSortedPlayers() {
    let copy = [...players];

    copy.sort((a, b) => {
        if (sortMode === "win") {
            return (b.wins / (b.wins + b.losses || 1)) -
                   (a.wins / (a.wins + a.losses || 1));
        } else {
            return (b.kills / (b.deaths || 1)) -
                   (a.kills / (a.deaths || 1));
        }
    });

    return copy;
}

/* ================= VIEW ================= */
function showPublic() {
    document.getElementById("publicView").style.display = "block";
    document.getElementById("adminPanel").style.display = "none";
    document.getElementById("loginBox").style.display = "none";
    renderPublic();
}

function openLogin() {
    document.getElementById("loginBox").style.display = "block";
    document.getElementById("publicView").style.display = "none";
    document.getElementById("adminPanel").style.display = "none";
}

/* ================= LOGIN ================= */
function login() {
    let pass = document.getElementById("password").value;

    if (pass === ADMIN_PASSWORD) {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("adminPanel").style.display = "block";
        renderAdmin();
    } else {
        alert("Wrong password");
    }
}

/* ================= CALC & STYLE HELPERS ================= */
function winRate(w, l) {
    if (w + l === 0) return "0.0%";
    return ((w / (w + l)) * 100).toFixed(1) + "%";
}

function kd(k, d) {
    if (d === 0) return k.toFixed(2);
    return (k / d).toFixed(2);
}

function getRankClass(index) {
    if (index === 0) return "rank-1";
    if (index === 1) return "rank-2";
    if (index === 2) return "rank-3";
    return "";
}

function getKdStyle(k, d) {
    const rawKd = d === 0 ? k : k / d;
    return rawKd >= 1.0 ? "color: var(--success); font-weight: bold;" : "color: var(--danger); font-weight: bold;";
}

/* ================= RENDER PUBLIC ================= */
function renderPublic() {
    let table = document.getElementById("publicTable");
    table.innerHTML = "";

    let sorted = getSortedPlayers();

    sorted.forEach((p, i) => {
        const rankClass = getRankClass(i);
        const kdStyle = getKdStyle(p.kills, p.deaths);

        table.innerHTML += `
        <tr>
            <td class="${rankClass}"><strong>#${i + 1}</strong></td>
            <td class="${rankClass}"><strong>${p.name}</strong></td>
            <td>${p.wins}</td>
            <td>${p.losses}</td>
            <td>${winRate(p.wins, p.losses)}</td>
            <td>${p.kills}</td>
            <td>${p.deaths}</td>
            <td style="${kdStyle}">${kd(p.kills, p.deaths)}</td>
        </tr>`;
    });
}

/* ================= RENDER ADMIN ================= */
function renderAdmin() {
    let table = document.getElementById("adminTable");
    table.innerHTML = "";

    let sorted = getSortedPlayers();

    sorted.forEach((p, rank) => {
        const realIndex = players.indexOf(p);
        const rankClass = getRankClass(rank);
        const kdStyle = getKdStyle(p.kills, p.deaths);

        table.innerHTML += `
        <tr>
            <td class="${rankClass}">#${rank + 1}</td>

            <td>
                <input value="${p.name}" class="${rankClass}"
                onchange="update(${realIndex}, 'name', this.value)">
            </td>

            <td><input type="number" value="${p.wins}"
                onchange="update(${realIndex}, 'wins', this.value)"></td>

            <td><input type="number" value="${p.losses}"
                onchange="update(${realIndex}, 'losses', this.value)"></td>

            <td><input type="number" value="${p.kills}"
                onchange="update(${realIndex}, 'kills', this.value)"></td>

            <td><input type="number" value="${p.deaths}"
                onchange="update(${realIndex}, 'deaths', this.value)"></td>

            <td>${winRate(p.wins, p.losses)}</td>
            <td style="${kdStyle}">${kd(p.kills, p.deaths)}</td>

            <td><button class="danger" onclick="remove(${realIndex})">Delete</button></td>
        </tr>`;
    });
}

/* ================= CRUD ================= */
async function addPlayer() {
    let name = document.getElementById("name").value.trim();
    if (!name) return alert("Enter name");

    players.push({
        name,
        wins: 0,
        losses: 0,
        kills: 0,
        deaths: 0
    });

    document.getElementById("name").value = "";
    await save();
}

async function update(i, field, value) {
    if (!players[i]) return;

    if (field === "name") players[i].name = value;
    else players[i][field] = Number(value) || 0;

    await save();
}

async function remove(i) {
    if (!confirm("Are you sure you want to delete this player?")) return;
    players.splice(i, 1);
    await save();
}

/* ================= RED MATRIX ENGINE ================= */
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');

let width = canvas.width = window.innerWidth;
let height = canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
});

const particles = [];
for (let i = 0; i < 50; i++) {
    particles.push({
        x: Math.random() * width,
        y: Math.random() * height,
        radius: Math.random() * 1.8 + 0.4,
        vx: (Math.random() - 0.5) * 0.3,
        vy: (Math.random() - 0.5) * 0.5
    });
}

function animateBackground() {
    ctx.clearRect(0, 0, width, height);
    
    // Grid Lines
    ctx.strokeStyle = 'rgba(231, 76, 60, 0.04)';
    ctx.lineWidth = 1;
    const gridSize = 50;
    for (let x = 0; x < width; x += gridSize) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, height); ctx.stroke();
    }
    for (let y = 0; y < height; y += gridSize) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(width, y); ctx.stroke();
    }

    // Red Embers
    ctx.fillStyle = 'rgba(231, 76, 60, 0.35)';
    particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;

        if (p.x < 0 || p.x > width) p.vx *= -1;
        if (p.y < 0 || p.y > height) p.vy *= -1;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fill();
    });

    requestAnimationFrame(animateBackground);
}
animateBackground();

/* ================= EXPOSE FUNCTIONS ================= */
window.showPublic = showPublic;
window.openLogin = openLogin;
window.login = login;
window.handleSort = handleSort;
window.addPlayer = addPlayer;
window.update = update;
window.remove = remove;

/* default view */
showPublic();
</script>

</body>
</html>
