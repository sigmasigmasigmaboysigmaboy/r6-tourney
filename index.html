<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>R6 Tournament Hub</title>

<style>
body {
    font-family: Arial;
    background: #0f0f0f;
    color: white;
    text-align: center;
}

h1 { color: #ffcc00; }

button {
    padding: 8px 12px;
    margin: 5px;
    background: #ffcc00;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

input {
    padding: 6px;
    margin: 3px;
}

table {
    width: 90%;
    margin: auto;
    border-collapse: collapse;
    margin-top: 20px;
}

th, td {
    border: 1px solid #333;
    padding: 10px;
}

th { background: #222; }

tr:nth-child(even) { background: #1a1a1a; }

#adminPanel { display: none; }
#loginBox { display: none; }
</style>
</head>

<body>

<h1>R6 Tournament Hub</h1>

<!-- NAV -->
<button onclick="showPublic()">Public Leaderboard</button>
<button onclick="openLogin()">Admin Panel</button>

<hr>

<!-- PUBLIC VIEW -->
<div id="publicView">
    <h2>Leaderboard (Public View)</h2>
    <table>
        <thead>
            <tr>
                <th>Player</th>
                <th>Wins</th>
                <th>Losses</th>
                <th>Win %</th>
                <th>Kills</th>
                <th>Deaths</th>
                <th>K/D</th>
            </tr>
        </thead>
        <tbody id="publicTable"></tbody>
    </table>
</div>

<!-- LOGIN -->
<div id="loginBox">
    <h2>Admin Login</h2>
    <input type="password" id="password" placeholder="Password">
    <br>
    <button onclick="login()">Login</button>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">
    <h2>Admin Panel</h2>

    <div>
        <input id="name" placeholder="Player Name">
        <button onclick="addPlayer()">Add Player</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Player</th>
                <th>Wins</th>
                <th>Losses</th>
                <th>Kills</th>
                <th>Deaths</th>
                <th>Win %</th>
                <th>K/D</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="adminTable"></tbody>
    </table>
</div>

<script>

const ADMIN_PASSWORD = "admin123"; // CHANGE THIS

let players = JSON.parse(localStorage.getItem("players")) || [];

/* ---------------- VIEW SWITCH ---------------- */
function showPublic() {
    document.getElementById("publicView").style.display = "block";
    document.getElementById("adminPanel").style.display = "none";
    document.getElementById("loginBox").style.display = "none";
    renderPublic();
}

function openLogin() {
    document.getElementById("loginBox").style.display = "block";
    document.getElementById("publicView").style.display = "none";
    document.getElementById("adminPanel").style.display = "none";
}

/* ---------------- LOGIN ---------------- */
function login() {
    let pass = document.getElementById("password").value;

    if (pass === ADMIN_PASSWORD) {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("adminPanel").style.display = "block";
        renderAdmin();
    } else {
        alert("Wrong password");
    }
}

/* ---------------- CALC ---------------- */
function winRate(w, l) {
    if (w + l === 0) return "0%";
    return ((w / (w + l)) * 100).toFixed(1) + "%";
}

function kd(k, d) {
    if (d === 0) return k.toFixed(2);
    return (k / d).toFixed(2);
}

/* ---------------- SAVE ---------------- */
function save() {
    localStorage.setItem("players", JSON.stringify(players));
}

/* ---------------- PUBLIC TABLE ---------------- */
function renderPublic() {
    let table = document.getElementById("publicTable");
    table.innerHTML = "";

    players.forEach(p => {
        table.innerHTML += `
        <tr>
            <td>${p.name}</td>
            <td>${p.wins}</td>
            <td>${p.losses}</td>
            <td>${winRate(p.wins, p.losses)}</td>
            <td>${p.kills}</td>
            <td>${p.deaths}</td>
            <td>${kd(p.kills, p.deaths)}</td>
        </tr>
        `;
    });
}

/* ---------------- ADMIN TABLE ---------------- */
function renderAdmin() {
    let table = document.getElementById("adminTable");
    table.innerHTML = "";

    players.forEach((p, i) => {
        table.innerHTML += `
        <tr>
            <td>${p.name}</td>
            <td><input type="number" value="${p.wins}" onchange="update(${i},'wins',this.value)"></td>
            <td><input type="number" value="${p.losses}" onchange="update(${i},'losses',this.value)"></td>
            <td><input type="number" value="${p.kills}" onchange="update(${i},'kills',this.value)"></td>
            <td><input type="number" value="${p.deaths}" onchange="update(${i},'deaths',this.value)"></td>
            <td>${winRate(p.wins, p.losses)}</td>
            <td>${kd(p.kills, p.deaths)}</td>
            <td><button onclick="remove(${i})">Delete</button></td>
        </tr>
        `;
    });

    save();
}

/* ---------------- ADD ---------------- */
function addPlayer() {
    let name = document.getElementById("name").value;
    if (!name) return alert("Enter name");

    players.push({
        name,
        wins: 0,
        losses: 0,
        kills: 0,
        deaths: 0
    });

    document.getElementById("name").value = "";
    renderAdmin();
}

/* ---------------- UPDATE ---------------- */
function update(i, field, value) {
    players[i][field] = parseInt(value) || 0;
    renderAdmin();
}

/* ---------------- DELETE ---------------- */
function remove(i) {
    players.splice(i, 1);
    renderAdmin();
}

/* ---------------- INIT ---------------- */
showPublic();

</script>

</body>
</html>
