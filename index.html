<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R6 Tournament Hub</title>

<style>
    :root {
        --bg-main: #0d0e11;
        --bg-card: #16171c;
        --bg-input: #1f2128;
        --accent: #f1c40f;
        --accent-hover: #f39c12;
        --text-main: #f5f6fa;
        --text-muted: #7f8c8d;
        --border: #2c2e38;
        --danger: #e74c3c;
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: var(--bg-main);
        color: var(--text-main);
        line-height: 1.6;
        padding: 20px;
    }

    .container {
        max-width: 1200px;
        margin: 0 auto;
    }

    header {
        margin-bottom: 30px;
        border-bottom: 2px solid var(--border);
        padding-bottom: 20px;
    }

    h1 {
        color: var(--accent);
        font-size: 2.5rem;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 15px;
        font-weight: 800;
    }

    /* Controls & Buttons */
    .nav-buttons, .sort-buttons {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-bottom: 15px;
        flex-wrap: wrap;
    }

    button {
        padding: 10px 20px;
        background: var(--accent);
        color: #000;
        border: none;
        cursor: pointer;
        font-weight: bold;
        text-transform: uppercase;
        font-size: 0.85rem;
        letter-spacing: 1px;
        transition: all 0.2s ease;
        border-radius: 4px;
    }

    button:hover {
        background: var(--accent-hover);
        transform: translateY(-1px);
    }

    button.secondary {
        background: var(--bg-input);
        color: var(--text-main);
        border: 1px solid var(--border);
    }

    button.secondary:hover {
        background: var(--border);
    }

    button.danger {
        background: var(--danger);
        color: white;
    }
    
    button.danger:hover {
        background: #c0392b;
    }

    input {
        padding: 10px 14px;
        background: var(--bg-input);
        border: 1px solid var(--border);
        color: white;
        border-radius: 4px;
        font-size: 0.9rem;
        transition: border-color 0.2s;
    }

    input:focus {
        outline: none;
        border-color: var(--accent);
    }

    /* Panel Content Containers */
    .view-panel {
        background: var(--bg-card);
        padding: 25px;
        border-radius: 8px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        border: 1px solid var(--border);
        margin-top: 20px;
    }

    h2 {
        font-size: 1.5rem;
        margin-bottom: 20px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #fff;
        border-left: 4px solid var(--accent);
        padding-left: 10px;
        text-align: left;
    }

    /* Admin Add Player Area */
    .add-player-form {
        display: flex;
        gap: 10px;
        margin-bottom: 25px;
        justify-content: flex-start;
    }

    /* Table Styling */
    .table-container {
        overflow-x: auto;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
        text-align: left;
    }

    th, td {
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
        font-size: 0.95rem;
    }

    th {
        background: #111217;
        color: var(--text-muted);
        text-transform: uppercase;
        font-size: 0.8rem;
        letter-spacing: 1px;
        font-weight: 700;
    }

    tr:hover {
        background: rgba(255, 255, 255, 0.02);
    }

    td input {
        width: 100%;
        padding: 6px 10px;
    }

    td input[type="number"] {
        width: 70px;
        text-align: center;
    }

    /* Auth Box */
    #loginBox {
        max-width: 350px;
        margin: 40px auto;
    }

    #loginBox input {
        width: 100%;
        margin-bottom: 15px;
        text-align: center;
    }

    #loginBox button {
        width: 100%;
    }

    #adminPanel { display: none; }
    #loginBox { display: none; }
</style>
</head>

<body>

<div class="container">
    <header>
        <h1>R6 Tournament Hub</h1>
        
        <div class="nav-buttons">
            <button onclick="showPublic()">Public Leaderboard</button>
            <button onclick="openLogin()" class="secondary">Admin Panel</button>
        </div>

        <div class="sort-buttons">
            <button onclick="setSort('kd')" class="secondary">Sort by K/D</button>
            <button onclick="setSort('win')" class="secondary">Sort by Win %</button>
        </div>
    </header>

    <!-- Public View -->
    <div id="publicView" class="view-panel">
        <h2>Leaderboard</h2>
        <div class="table-container">
            <table>
                <thead>
                <tr>
                    <th>Rank</th>
                    <th>Player</th>
                    <th>Wins</th>
                    <th>Losses</th>
                    <th>Win %</th>
                    <th>Kills</th>
                    <th>Deaths</th>
                    <th>K/D</th>
                </tr>
                </thead>
                <tbody id="publicTable"></tbody>
            </table>
        </div>
    </div>

    <!-- Login View -->
    <div id="loginBox" class="view-panel">
        <h2>Admin Login</h2>
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Access Database</button>
    </div>

    <!-- Admin View -->
    <div id="adminPanel" class="view-panel">
        <h2>Admin Panel</h2>
        
        <div class="add-player-form">
            <input id="name" placeholder="Player Name">
            <button onclick="addPlayer()">Add Player</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                <tr>
                    <th>Rank</th>
                    <th>Player</th>
                    <th>Wins</th>
                    <th>Losses</th>
                    <th>Kills</th>
                    <th>Deaths</th>
                    <th>Win %</th>
                    <th>K/D</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody id="adminTable"></tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
/* ================= FIREBASE ================= */
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
import {
    getFirestore,
    doc,
    setDoc,
    onSnapshot
} from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyCB88kRN8uPwJc8q_KcGqlmPA9rBCF58ro",
    authDomain: "r6-tourney.firebaseapp.com",
    projectId: "r6-tourney",
    storageBucket: "r6-tourney.firebasestorage.app",
    messagingSenderId: "348732226476",
    appId: "1:348732226476:web:dea6f1907aed3ddbc29809"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const DOC_REF = doc(db, "leaderboard", "players");

/* ================= STATE ================= */
const ADMIN_PASSWORD = "admin123";
let sortMode = "kd";
let players = [];

/* ================= REALTIME SYNC ================= */
onSnapshot(DOC_REF, (snap) => {
    if (snap.exists()) {
        players = snap.data().players || [];
    } else {
        players = [];
    }

    renderPublic();
    renderAdmin();
});

/* ================= SAVE ================= */
async function save() {
    await setDoc(DOC_REF, {
        players
    });
}

/* ================= SORT ================= */
function setSort(mode) {
    sortMode = mode;
    renderPublic();
    renderAdmin();
}

function getSortedPlayers() {
    let copy = [...players];

    copy.sort((a, b) => {
        if (sortMode === "win") {
            return (b.wins / (b.wins + b.losses || 1)) -
                   (a.wins / (a.wins + a.losses || 1));
        } else {
            return (b.kills / (b.deaths || 1)) -
                   (a.kills / (a.deaths || 1));
        }
    });

    return copy;
}

/* ================= VIEW ================= */
function showPublic() {
    document.getElementById("publicView").style.display = "block";
    document.getElementById("adminPanel").style.display = "none";
    document.getElementById("loginBox").style.display = "none";
    renderPublic();
}

function openLogin() {
    document.getElementById("loginBox").style.display = "block";
    document.getElementById("publicView").style.display = "none";
    document.getElementById("adminPanel").style.display = "none";
}

/* ================= LOGIN ================= */
function login() {
    let pass = document.getElementById("password").value;

    if (pass === ADMIN_PASSWORD) {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("adminPanel").style.display = "block";
        renderAdmin();
    } else {
        alert("Wrong password");
    }
}

/* ================= CALC ================= */
function winRate(w, l) {
    if (w + l === 0) return "0.0%";
    return ((w / (w + l)) * 100).toFixed(1) + "%";
}

function kd(k, d) {
    if (d === 0) return k.toFixed(2);
    return (k / d).toFixed(2);
}

/* ================= RENDER PUBLIC ================= */
function renderPublic() {
    let table = document.getElementById("publicTable");
    table.innerHTML = "";

    let sorted = getSortedPlayers();

    sorted.forEach((p, i) => {
        table.innerHTML += `
        <tr>
            <td><strong>#${i + 1}</strong></td>
            <td><strong>${p.name}</strong></td>
            <td>${p.wins}</td>
            <td>${p.losses}</td>
            <td>${winRate(p.wins, p.losses)}</td>
            <td>${p.kills}</td>
            <td>${p.deaths}</td>
            <td style="color: var(--accent); font-weight: bold;">${kd(p.kills, p.deaths)}</td>
        </tr>`;
    });
}

/* ================= RENDER ADMIN ================= */
function renderAdmin() {
    let table = document.getElementById("adminTable");
    table.innerHTML = "";

    let sorted = getSortedPlayers();

    sorted.forEach((p, rank) => {
        const realIndex = players.indexOf(p);

        table.innerHTML += `
        <tr>
            <td>#${rank + 1}</td>

            <td>
                <input value="${p.name}"
                onchange="update(${realIndex}, 'name', this.value)">
            </td>

            <td><input type="number" value="${p.wins}"
                onchange="update(${realIndex}, 'wins', this.value)"></td>

            <td><input type="number" value="${p.losses}"
                onchange="update(${realIndex}, 'losses', this.value)"></td>

            <td><input type="number" value="${p.kills}"
                onchange="update(${realIndex}, 'kills', this.value)"></td>

            <td><input type="number" value="${p.deaths}"
                onchange="update(${realIndex}, 'deaths', this.value)"></td>

            <td>${winRate(p.wins, p.losses)}</td>
            <td>${kd(p.kills, p.deaths)}</td>

            <td><button class="danger" onclick="remove(${realIndex})">Delete</button></td>
        </tr>`;
    });
}

/* ================= CRUD ================= */
async function addPlayer() {
    let name = document.getElementById("name").value.trim();
    if (!name) return alert("Enter name");

    players.push({
        name,
        wins: 0,
        losses: 0,
        kills: 0,
        deaths: 0
    });

    document.getElementById("name").value = "";
    await save();
}

async function update(i, field, value) {
    if (!players[i]) return;

    if (field === "name") players[i].name = value;
    else players[i][field] = Number(value) || 0;

    await save();
}

async function remove(i) {
    if (!confirm("Are you sure you want to delete this player?")) return;
    players.splice(i, 1);
    await save();
}

/* ================= EXPOSE FUNCTIONS ================= */
window.showPublic = showPublic;
window.openLogin = openLogin;
window.login = login;
window.setSort = setSort;
window.addPlayer = addPlayer;
window.update = update;
window.remove = remove;

/* default view */
showPublic();
</script>

</body>
</html>
