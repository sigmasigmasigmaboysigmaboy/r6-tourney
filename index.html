<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>R6 Tournament Hub</title>

<style>
body {
    font-family: Arial;
    background: #0f0f0f;
    color: white;
    text-align: center;
}

h1 { color: #ffcc00; }

button {
    padding: 8px 12px;
    margin: 5px;
    background: #ffcc00;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

input {
    padding: 6px;
    margin: 3px;
}

table {
    width: 90%;
    margin: auto;
    border-collapse: collapse;
    margin-top: 20px;
}

th, td {
    border: 1px solid #333;
    padding: 10px;
}

th { background: #222; }

tr:nth-child(even) { background: #1a1a1a; }
tr:hover { background: #2a2a2a; }

#adminPanel { display: none; }
#loginBox { display: none; }

input[type="number"] { width: 60px; }
</style>
</head>

<body>

<h1>R6 Tournament Hub</h1>

<button onclick="showPublic()">Public Leaderboard</button>
<button onclick="openLogin()">Admin Panel</button>

<br>

<button onclick="setSort('kd')">Sort by K/D</button>
<button onclick="setSort('win')">Sort by Win %</button>

<hr>

<div id="publicView">
    <h2>Leaderboard</h2>
    <table>
        <thead>
        <tr>
            <th>Rank</th>
            <th>Player</th>
            <th>Wins</th>
            <th>Losses</th>
            <th>Win %</th>
            <th>Kills</th>
            <th>Deaths</th>
            <th>K/D</th>
        </tr>
        </thead>
        <tbody id="publicTable"></tbody>
    </table>
</div>

<div id="loginBox">
    <h2>Admin Login</h2>
    <input type="password" id="password" placeholder="Password">
    <br>
    <button onclick="login()">Login</button>
</div>

<div id="adminPanel">
    <h2>Admin Panel</h2>

    <input id="name" placeholder="Player Name">
    <button onclick="addPlayer()">Add Player</button>

    <table>
        <thead>
        <tr>
            <th>Rank</th>
            <th>Player</th>
            <th>Wins</th>
            <th>Losses</th>
            <th>Kills</th>
            <th>Deaths</th>
            <th>Win %</th>
            <th>K/D</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody id="adminTable"></tbody>
    </table>
</div>

<script type="module">
/* ================= FIREBASE ================= */
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
import {
    getFirestore,
    doc,
    setDoc,
    getDoc,
    onSnapshot
} from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";

/* 🔴 PUT YOUR FIREBASE CONFIG HERE */
const firebaseConfig = {
    apiKey: "AIzaSyCB88kRN8uPwJc8q_KcGqlmPA9rBCF58ro",
    authDomain: "r6-tourney.firebaseapp.com",
    projectId: "r6-tourney",
    storageBucket: "r6-tourney.firebasestorage.app",
    messagingSenderId: "348732226476",
    appId: "1:348732226476:web:dea6f1907aed3ddbc29809"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const DOC_REF = doc(db, "leaderboard", "players");

/* ================= STATE ================= */
const ADMIN_PASSWORD = "admin123";
let sortMode = "kd";
let players = [];

/* ================= REALTIME SYNC ================= */
onSnapshot(DOC_REF, (snap) => {
    if (snap.exists()) {
        players = snap.data().players || [];
    } else {
        players = [];
    }

    renderPublic();
    renderAdmin();
});

/* ================= SAVE ================= */
async function save() {
    await setDoc(DOC_REF, {
        players
    });
}

/* ================= SORT ================= */
function setSort(mode) {
    sortMode = mode;
    renderPublic();
    renderAdmin();
}

function getSortedPlayers() {
    let copy = [...players];

    copy.sort((a, b) => {
        if (sortMode === "win") {
            return (b.wins / (b.wins + b.losses || 1)) -
                   (a.wins / (a.wins + a.losses || 1));
        } else {
            return (b.kills / (b.deaths || 1)) -
                   (a.kills / (a.deaths || 1));
        }
    });

    return copy;
}

/* ================= VIEW ================= */
function showPublic() {
    document.getElementById("publicView").style.display = "block";
    document.getElementById("adminPanel").style.display = "none";
    document.getElementById("loginBox").style.display = "none";
    renderPublic();
}

function openLogin() {
    document.getElementById("loginBox").style.display = "block";
    document.getElementById("publicView").style.display = "none";
    document.getElementById("adminPanel").style.display = "none";
}

/* ================= LOGIN ================= */
function login() {
    let pass = document.getElementById("password").value;

    if (pass === ADMIN_PASSWORD) {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("adminPanel").style.display = "block";
        renderAdmin();
    } else {
        alert("Wrong password");
    }
}

/* ================= CALC ================= */
function winRate(w, l) {
    if (w + l === 0) return "0%";
    return ((w / (w + l)) * 100).toFixed(1) + "%";
}

function kd(k, d) {
    if (d === 0) return k.toFixed(2);
    return (k / d).toFixed(2);
}

/* ================= RENDER PUBLIC ================= */
function renderPublic() {
    let table = document.getElementById("publicTable");
    table.innerHTML = "";

    let sorted = getSortedPlayers();

    sorted.forEach((p, i) => {
        table.innerHTML += `
        <tr>
            <td>${i + 1}</td>
            <td>${p.name}</td>
            <td>${p.wins}</td>
            <td>${p.losses}</td>
            <td>${winRate(p.wins, p.losses)}</td>
            <td>${p.kills}</td>
            <td>${p.deaths}</td>
            <td>${kd(p.kills, p.deaths)}</td>
        </tr>`;
    });
}

/* ================= RENDER ADMIN ================= */
function renderAdmin() {
    let table = document.getElementById("adminTable");
    table.innerHTML = "";

    let sorted = getSortedPlayers();

    sorted.forEach((p, rank) => {
        const realIndex = players.indexOf(p);

        table.innerHTML += `
        <tr>
            <td>${rank + 1}</td>

            <td>
                <input value="${p.name}"
                onchange="update(${realIndex}, 'name', this.value)">
            </td>

            <td><input type="number" value="${p.wins}"
                onchange="update(${realIndex}, 'wins', this.value)"></td>

            <td><input type="number" value="${p.losses}"
                onchange="update(${realIndex}, 'losses', this.value)"></td>

            <td><input type="number" value="${p.kills}"
                onchange="update(${realIndex}, 'kills', this.value)"></td>

            <td><input type="number" value="${p.deaths}"
                onchange="update(${realIndex}, 'deaths', this.value)"></td>

            <td>${winRate(p.wins, p.losses)}</td>
            <td>${kd(p.kills, p.deaths)}</td>

            <td><button onclick="remove(${realIndex})">Delete</button></td>
        </tr>`;
    });
}

/* ================= CRUD ================= */
async function addPlayer() {
    let name = document.getElementById("name").value.trim();
    if (!name) return alert("Enter name");

    players.push({
        name,
        wins: 0,
        losses: 0,
        kills: 0,
        deaths: 0
    });

    document.getElementById("name").value = "";
    await save();
}

async function update(i, field, value) {
    if (!players[i]) return;

    if (field === "name") players[i].name = value;
    else players[i][field] = Number(value) || 0;

    await save();
}

async function remove(i) {
    players.splice(i, 1);
    await save();
}

/* ================= EXPOSE FUNCTIONS ================= */
window.showPublic = showPublic;
window.openLogin = openLogin;
window.login = login;
window.setSort = setSort;
window.addPlayer = addPlayer;
window.update = update;
window.remove = remove;

/* default view */
showPublic();
</script>

</body>
</html>
