<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R6 Tournament Hub</title>

<style>
    :root {
        --bg-main: #08090a;
        --bg-card: rgba(17, 18, 22, 0.88);
        --bg-input: #17181d;
        --accent: #e74c3c;
        --accent-hover: #c0392b;
        --text-main: #f5f6fa;
        --text-muted: #718093;
        --border: #2c2d35;
        --success: #2ecc71;
        --danger: #e74c3c;
        
        /* Podium Colors */
        --gold: #f1c40f;
        --silver: #bdc3c7;
        --bronze: #e67e22;
        
        /* Row Dimensions & Gaps */
        --row-height: 54px;
        --row-gap: 8px;
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: var(--bg-main);
        color: var(--text-main);
        line-height: 1.6;
        padding: 20px;
        overflow-x: hidden;
        position: relative;
        min-height: 100vh;
    }

    #bg-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -1;
        pointer-events: none;
    }

    .container {
        max-width: 1200px;
        margin: 0 auto;
        position: relative;
        z-index: 1;
    }

    header {
        margin-bottom: 30px;
        border-bottom: 2px solid var(--border);
        padding-bottom: 20px;
        animation: fadeInDown 0.6s ease-out;
        text-align: center;
    }

    h1 {
        color: var(--accent);
        font-size: 2.5rem;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 15px;
        font-weight: 800;
        text-shadow: 0 0 15px rgba(231, 76, 60, 0.4);
    }

    .tourney-selector-zone {
        margin: 15px 0;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
    }

    select {
        padding: 10px 20px;
        background: var(--bg-input);
        color: white;
        border: 1px solid var(--border);
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
        outline: none;
    }

    select:focus { border-color: var(--accent); }

    .nav-buttons, .sort-buttons {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-bottom: 15px;
        flex-wrap: wrap;
    }

    button {
        padding: 10px 20px;
        background: var(--accent);
        color: #fff;
        border: none;
        cursor: pointer;
        font-weight: bold;
        text-transform: uppercase;
        font-size: 0.85rem;
        letter-spacing: 1px;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        border-radius: 6px;
    }

    button:active { transform: scale(0.95); }
    button:hover {
        background: var(--accent-hover);
        box-shadow: 0 0 12px rgba(231, 76, 60, 0.5);
    }

    button.secondary {
        background: var(--bg-input);
        color: var(--text-main);
        border: 1px solid var(--border);
    }
    button.secondary:hover { background: var(--border); }

    button.danger { background: #95a5a6; color: #fff; }
    button.danger:hover { background: var(--danger); }

    input {
        padding: 10px 14px;
        background: var(--bg-input);
        border: 1px solid var(--border);
        color: white;
        border-radius: 6px;
        font-size: 0.9rem;
        transition: all 0.2s ease;
    }
    input:focus {
        outline: none;
        border-color: var(--accent);
        background: #20222a;
    }

    .view-panel {
        background: var(--bg-card);
        padding: 25px;
        border-radius: 16px;
        box-shadow: 0 10px 35px rgba(0,0,0,0.8);
        border: 1px solid var(--border);
        margin-top: 20px;
        backdrop-filter: blur(8px);
    }

    h2 {
        font-size: 1.5rem;
        margin-bottom: 20px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #fff;
        border-left: 4px solid var(--accent);
        padding-left: 10px;
    }

    .management-block {
        background: rgba(0, 0, 0, 0.2);
        padding: 15px;
        border-radius: 8px;
        border: 1px dashed var(--border);
        margin-bottom: 20px;
    }

    .inline-form {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 10px;
        align-items: center;
    }

    /* Column Sizing Rules */
    .grid-table {
        display: grid;
        width: 100%;
        min-width: 800px;
        border-radius: 12px;
    }

    .public-grid .grid-header, .public-grid .grid-row {
        display: grid;
        grid-template-columns: 0.8fr 2.5fr 1fr 1fr 1.2fr 1fr 1fr 1fr;
    }

    .admin-grid .grid-header, .admin-grid .grid-row {
        display: grid;
        grid-template-columns: 0.8fr 2.5fr 1fr 1fr 1fr 1fr 1.2fr 1fr 1.5fr;
    }

    .grid-header > div {
        background: rgba(10, 11, 13, 0.95);
        color: var(--text-muted);
        text-transform: uppercase;
        font-size: 0.8rem;
        letter-spacing: 1px;
        font-weight: 700;
        padding: 14px 16px;
        margin-bottom: 12px;
    }

    .grid-body {
        display: block;
        position: relative;
        width: 100%;
    }

    .grid-row {
        position: absolute;
        left: 0;
        width: 100%;
        height: var(--row-height);
        align-items: center;
        border: 1px solid rgba(231, 76, 60, 0.4); 
        background: rgba(20, 21, 26, 0.7);
        border-radius: 8px;
        transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1), background 0.2s ease, border-color 0.2s ease;
    }
    .grid-row:hover {
        background: rgba(231, 76, 60, 0.12);
        border-color: var(--accent);
    }

    .grid-row > div {
        padding: 0 16px;
        font-size: 0.95rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .grid-row input { width: 100%; padding: 6px 10px; border-radius: 4px; }
    .grid-row input[type="number"] { text-align: center; }

    .rank-1 { color: var(--gold) !important; font-weight: bold; text-shadow: 0 0 8px rgba(241, 196, 21, 0.3); }
    .rank-2 { color: var(--silver) !important; font-weight: bold; }
    .rank-3 { color: var(--bronze) !important; font-weight: bold; }

    /* ================= VISUAL TREE BRACKET SYSTEM UI ================= */
    .bracket-container {
        display: flex;
        gap: 40px;
        margin-top: 30px;
        padding: 10px;
        min-width: max-content;
        justify-content: flex-start;
    }

    .bracket-round {
        display: flex;
        flex-direction: column;
        justify-content: space-around;
        width: 240px;
    }

    .bracket-round-title {
        text-align: center;
        color: var(--text-muted);
        text-transform: uppercase;
        font-size: 0.85rem;
        letter-spacing: 2px;
        margin-bottom: 15px;
        font-weight: bold;
    }

    .matchup {
        background: rgba(20, 21, 26, 0.8);
        border: 1px solid rgba(231, 76, 60, 0.3);
        border-radius: 8px;
        margin: 15px 0;
        padding: 5px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    }

    .bracket-team {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 12px;
        border-radius: 4px;
    }

    .bracket-team:first-child {
        border-bottom: 1px solid var(--border);
    }

    .bracket-team input.team-name {
        background: transparent;
        border: none;
        color: white;
        font-weight: 600;
        width: 75%;
        padding: 2px;
    }
    .bracket-team input.team-name:focus { background: var(--bg-input); }

    .bracket-team input.team-score {
        width: 40px;
        text-align: center;
        background: var(--bg-input);
        border: 1px solid var(--border);
        color: white;
        font-weight: bold;
        border-radius: 4px;
        padding: 4px;
    }

    .public-score {
        font-weight: bold;
        color: var(--accent);
        background: rgba(231, 76, 60, 0.1);
        padding: 2px 8px;
        border-radius: 4px;
        min-width: 30px;
        text-align: center;
    }

    .public-team-name { font-weight: 600; }
    
    .bye-slot { color: var(--text-muted) !important; font-style: italic; }

    .overflow-container {
        overflow-x: auto;
        width: 100%;
        border-radius: 12px;
        padding: 4px;
    }

    #adminPanel, #loginBox { display: none; }
</style>
</head>

<body>

<canvas id="bg-canvas"></canvas>

<div class="container">
    <header>
        <h1>R6 Tournament Hub</h1>
        
        <div class="tourney-selector-zone">
            <label for="globalTourneySelect" style="font-weight: bold; color: var(--text-muted); text-transform: uppercase; font-size: 0.8rem;">Active Arena:</label>
            <select id="globalTourneySelect" onchange="switchTournament(this.value)"></select>
        </div>

        <div class="nav-buttons">
            <button onclick="showPublic()">Public Dashboard</button>
            <button onclick="openLogin()" class="secondary">Admin Panel</button>
        </div>

        <div class="sort-buttons">
            <button onclick="setSort('kd')" class="secondary">Sort by K/D</button>
            <button onclick="setSort('win')" class="secondary">Sort by Win %</button>
        </div>
    </header>

    <div id="publicView" class="view-panel">
        <h2>Leaderboard</h2>
        <div class="overflow-container">
            <div class="grid-table public-grid">
                <div class="grid-header">
                    <div>Rank</div>
                    <div>Player</div>
                    <div>Wins</div>
                    <div>Losses</div>
                    <div>Win %</div>
                    <div>Kills</div>
                    <div>Deaths</div>
                    <div>K/D</div>
                </div>
                <div id="publicTable" class="grid-body"></div>
            </div>
        </div>

        <h2 style="margin-top: 40px;">Tournament Bracket Tree</h2>
        <div class="overflow-container">
            <div id="publicBracket" class="bracket-container"></div>
        </div>
    </div>

    <div id="loginBox" class="view-panel">
        <h2>Admin Login</h2>
        <input type="password" id="password" placeholder="Password" style="width:100%; margin-bottom:15px; text-align:center;">
        <button onclick="login()" style="width: 100%;">Access Database</button>
    </div>

    <div id="adminPanel" class="view-panel">
        <h2>Admin Tournament Management</h2>
        
        <div class="management-block">
            <span style="font-weight: bold; color: var(--accent); text-transform: uppercase; font-size: 0.85rem;">Create New Tournament Arena</span>
            <div class="inline-form">
                <input id="newTourneyName" placeholder="e.g., Challenger Cup">
                <input id="newTourneyTeamsCount" type="number" placeholder="Number of Teams (e.g. 5, 11, 16)" min="2" style="width: 250px;">
                <button onclick="createNewTournament()">Generate Tournament</button>
            </div>
        </div>

        <div class="management-block" style="border-color: rgba(231, 76, 60, 0.4);">
            <span style="font-weight: bold; color: #fff; text-transform: uppercase; font-size: 0.85rem;">Active Arena Configurations</span>
            <div class="inline-form">
                <label style="color: var(--text-muted); font-size: 0.9rem;">Rename Arena:</label>
                <input id="activeTourneyRenameInput" placeholder="New Arena Title" style="width: 200px;">
                <button onclick="renameActiveTournament()">Apply Title</button>
                
                <span style="color: var(--border); margin: 0 5px;">|</span>

                <label style="color: var(--text-muted); font-size: 0.9rem;">Total Teams:</label>
                <input id="activeTeamsCountModifier" type="number" min="2" style="width: 80px;">
                <button onclick="changeActiveTeamsCount()">Resize Bracket</button>
                
                <button onclick="deleteActiveTournament()" class="danger" style="margin-left: auto;">Delete Tournament</button>
            </div>
        </div>

        <h2>Manage Players</h2>
        <div class="add-player-form">
            <input id="name" placeholder="Player Name">
            <button onclick="addPlayer()">Add Player</button>
        </div>

        <div class="overflow-container">
            <div class="grid-table admin-grid">
                <div class="grid-header">
                    <div>Rank</div>
                    <div>Player</div>
                    <div>Wins</div>
                    <div>Losses</div>
                    <div>Kills</div>
                    <div>Deaths</div>
                    <div>Win %</div>
                    <div>K/D</div>
                    <div>Actions</div>
                </div>
                <div id="adminTable" class="grid-body"></div>
            </div>
        </div>

        <h2 style="margin-top: 40px;">Manage Tree Nodes</h2>
        <div class="overflow-container">
            <div id="adminBracket" class="bracket-container"></div>
        </div>
        <div style="margin-top: 20px; text-align: right;">
            <button onclick="saveBracketEdits()">Save Structural Bracket Changes</button>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyCB88kRN8uPwJc8q_KcGqlmPA9rBCF58ro",
    authDomain: "r6-tourney.firebaseapp.com",
    projectId: "r6-tourney",
    storageBucket: "r6-tourney.firebasestorage.app",
    messagingSenderId: "348732226476",
    appId: "1:348732226476:web:dea6f1907aed3ddbc29809"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const GLOBAL_DOC_REF = doc(db, "leaderboard", "v2_ecosystem");

/* ================= APP CORE SYSTEM STATE ================= */
const ADMIN_PASSWORD = "admin123";
let sortMode = "kd";
let currentTourneyId = "default_arena";

let databaseState = {
    tournaments: {
        "default_arena": {
            name: "Alpha Tournament",
            teamCount: 8,
            players: [],
            bracket: generateTreeStructure(8)
        }
    }
};

// Formulates complete map nodes required based on closest next power-of-2 tree sizing
function getNextPowerOfTwo(n) {
    if (n <= 2) return 2;
    if (n <= 4) return 4;
    if (n <= 8) return 8;
    if (n <= 16) return 16;
    return 32;
}

function generateTreeStructure(teamCount) {
    const p2Size = getNextPowerOfTwo(teamCount);
    const nodes = {};
    
    // Always build structure down to Grand Finals
    nodes["f_t1"] = "TBD"; nodes["f_t2"] = "TBD"; nodes["f_s1"] = "0"; nodes["f_s2"] = "0";
    nodes["s1_t1"] = "TBD"; nodes["s1_t2"] = "TBD"; nodes["s1_s1"] = "0"; nodes["s1_s2"] = "0";
    nodes["s2_t1"] = "TBD"; nodes["s2_t2"] = "TBD"; nodes["s2_s1"] = "0"; nodes["s2_s2"] = "0";

    if (p2Size >= 8) {
        for (let i = 1; i <= 4; i++) {
            nodes[`q${i}_t1`] = "TBD"; nodes[`q${i}_t2`] = "TBD";
            nodes[`q${i}_s1`] = "0"; nodes[`q${i}_s2`] = "0";
        }
    }
    if (p2Size >= 16) {
        for (let i = 1; i <= 8; i++) {
            nodes[`r1_${i}_t1`] = "TBD"; nodes[`r1_${i}_t2`] = "TBD";
            nodes[`r1_${i}_s1`] = "0"; nodes[`r1_${i}_s2`] = "0";
        }
    }

    // Distribute automatic BYEs across first tier matches based on uneven counts
    let activeSlotsNeeded = teamCount;
    let totalSlotsAvailable = p2Size;
    let byesToGive = totalSlotsAvailable - activeSlotsNeeded;

    const prefix = p2Size === 16 ? "r1_" : (p2Size === 8 ? "q" : "s");
    const loops = p2Size / 2;

    for (let i = 1; i <= loops; i++) {
        nodes[`${prefix}${i}_t1`] = `Team #${(i*2)-1}`;
        nodes[`${prefix}${i}_t2`] = `Team #${i*2}`;

        if (byesToGive > 0) {
            nodes[`${prefix}${i}_t2`] = "BYE";
            nodes[`${prefix}${i}_s1`] = "1"; // Auto score winner weight
            byesToGive--;
        }
    }
    return nodes;
}

/* ================= REALTIME ENGINE ================= */
onSnapshot(GLOBAL_DOC_REF, (snap) => {
    if (snap.exists()) {
        databaseState = snap.data();
    } else {
        saveState();
    }
    
    populateTournamentSelectors();
    updateLeaderboards();
    renderBrackets();
});

async function saveState() {
    await setDoc(GLOBAL_DOC_REF, databaseState);
}

/* ================= CONFIG ENGINE CORE UTILS ================= */
function populateTournamentSelectors() {
    const selector = document.getElementById("globalTourneySelect");
    const previousSelection = selector.value || currentTourneyId;
    
    selector.innerHTML = "";
    Object.keys(databaseState.tournaments).forEach(id => {
        const option = document.createElement("option");
        option.value = id;
        option.innerText = databaseState.tournaments[id].name;
        selector.appendChild(option);
    });

    if (databaseState.tournaments[previousSelection]) {
        selector.value = previousSelection;
        currentTourneyId = previousSelection;
    } else {
        currentTourneyId = Object.keys(databaseState.tournaments)[0] || "";
        selector.value = currentTourneyId;
    }

    const countModifier = document.getElementById("activeTeamsCountModifier");
    const renameInput = document.getElementById("activeTourneyRenameInput");
    
    if (databaseState.tournaments[currentTourneyId]) {
        if (countModifier) countModifier.value = databaseState.tournaments[currentTourneyId].teamCount || 8;
        if (renameInput && document.activeElement !== renameInput) {
            renameInput.value = databaseState.tournaments[currentTourneyId].name || "";
        }
    }
}

function switchTournament(id) {
    currentTourneyId = id;
    updateLeaderboards();
    renderBrackets();
}

async function createNewTournament() {
    const nameInput = document.getElementById("newTourneyName");
    const countInput = document.getElementById("newTourneyTeamsCount");
    const name = nameInput.value.trim();
    const count = parseInt(countInput.value) || 8;

    if (!name) return alert("Please type an arena blueprint name!");
    if (count < 2) return alert("Tournaments require at least 2 teams!");

    const newId = "arena_" + Date.now();
    databaseState.tournaments[newId] = {
        name: name,
        teamCount: count,
        players: [],
        bracket: generateTreeStructure(count)
    };

    nameInput.value = "";
    countInput.value = "";
    currentTourneyId = newId;
    await saveState();
}

async function renameActiveTournament() {
    if (!databaseState.tournaments[currentTourneyId]) return;
    const renameInput = document.getElementById("activeTourneyRenameInput");
    const newName = renameInput.value.trim();
    if (!newName) return alert("Name cannot be blank!");

    databaseState.tournaments[currentTourneyId].name = newName;
    await saveState();
    alert("Tournament title updated!");
}

async function changeActiveTeamsCount() {
    if (!databaseState.tournaments[currentTourneyId]) return;
    const countInput = document.getElementById("activeTeamsCountModifier");
    const newCount = parseInt(countInput.value) || 8;

    if (newCount < 2) return alert("Must have 2+ teams!");
    if (!confirm(`Regenerating team capacity to ${newCount} will reset custom seed layout nodes. Proceed?`)) return;

    databaseState.tournaments[currentTourneyId].teamCount = newCount;
    databaseState.tournaments[currentTourneyId].bracket = generateTreeStructure(newCount);
    await saveState();
}

async function deleteActiveTournament() {
    if (!databaseState.tournaments[currentTourneyId]) return;
    if (!confirm(`Permanently wipe out this active arena ecosystem?`)) return;

    delete databaseState.tournaments[currentTourneyId];
    const remainingIds = Object.keys(databaseState.tournaments);
    
    if (remainingIds.length === 0) {
        databaseState.tournaments["default_arena"] = {
            name: "Alpha Tournament",
            teamCount: 8,
            players: [],
            bracket: generateTreeStructure(8)
        };
        currentTourneyId = "default_arena";
    } else {
        currentTourneyId = remainingIds[0];
    }

    await saveState();
}

function getActivePlayers() { return databaseState.tournaments[currentTourneyId]?.players || []; }
function getActiveBracket() { return databaseState.tournaments[currentTourneyId]?.bracket || {}; }
function getActiveTeamCount() { return databaseState.tournaments[currentTourneyId]?.teamCount || 8; }

/* ================= SORT SELECTION ENGINE ================= */
function setSort(mode) { sortMode = mode; updateLeaderboards(); }
function getSortedPlayers() {
    let copy = [...getActivePlayers()];
    copy.sort((a, b) => {
        if (sortMode === "win") return (b.wins / (b.wins + b.losses || 1)) - (a.wins / (a.wins + a.losses || 1));
        return (b.kills / (b.deaths || 1)) - (a.kills / (a.deaths || 1));
    });
    return copy;
}

/* ================= INTERFACE VIEW VISIBILITIES ================= */
function showPublic() {
    document.getElementById("publicView").style.display = "block";
    document.getElementById("adminPanel").style.display = "none";
    document.getElementById("loginBox").style.display = "none";
    updateLeaderboards();
}
function openLogin() {
    document.getElementById("loginBox").style.display = "block";
    document.getElementById("publicView").style.display = "none";
    document.getElementById("adminPanel").style.display = "none";
}
function login() {
    if (document.getElementById("password").value === ADMIN_PASSWORD) {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("adminPanel").style.display = "block";
        updateLeaderboards();
    } else alert("Denied.");
}

/* ================= STATS CONTROLLERS ================= */
function winRate(w, l) { return (w + l === 0) ? "0.0%" : ((w / (w + l)) * 100).toFixed(1) + "%"; }
function kd(k, d) { return d === 0 ? k.toFixed(2) : (k / d).toFixed(2); }
function getRankClass(i) { return i===0 ? "rank-1" : (i===1 ? "rank-2" : (i===2 ? "rank-3" : "")); }
function getKdStyle(k, d) { return (d===0?k:k/d) >= 1.0 ? "color:var(--success);font-weight:bold;" : "color:var(--danger);font-weight:bold;"; }

/* ================= DYNAMIC DOM TABLES RENDERING ================= */
function updateLeaderboards() {
    const sorted = getSortedPlayers();
    syncContainer("publicTable", sorted, (p, i) => `
        <div class="${getRankClass(i)}"><strong>#${i + 1}</strong></div>
        <div class="${getRankClass(i)}"><strong>${p.name}</strong></div>
        <div>${p.wins}</div><div>${p.losses}</div><div>${winRate(p.wins, p.losses)}</div>
        <div>${p.kills}</div><div>${p.deaths}</div><div style="${getKdStyle(p.kills, p.deaths)}">${kd(p.kills, p.deaths)}</div>
    `);

    syncContainer("adminTable", sorted, (p, rank) => {
        const realIndex = getActivePlayers().findIndex(orig => orig.name === p.name);
        return `
            <div class="${getRankClass(rank)}">#${rank + 1}</div>
            <div><input value="${p.name}" class="${getRankClass(rank)}" onchange="updatePlayer(${realIndex}, 'name', this.value)"></div>
            <div><input type="number" value="${p.wins}" onchange="updatePlayer(${realIndex}, 'wins', this.value)"></div>
            <div><input type="number" value="${p.losses}" onchange="updatePlayer(${realIndex}, 'losses', this.value)"></div>
            <div><input type="number" value="${p.kills}" onchange="updatePlayer(${realIndex}, 'kills', this.value)"></div>
            <div><input type="number" value="${p.deaths}" onchange="updatePlayer(${realIndex}, 'deaths', this.value)"></div>
            <div>${winRate(p.wins, p.losses)}</div><div style="${getKdStyle(p.kills, p.deaths)}">${kd(p.kills, p.deaths)}</div>
            <div><button class="danger" onclick="removePlayer(${realIndex})">Delete</button></div>
        `;
    });
}

function syncContainer(containerId, sortedData, htmlGenerator) {
    const container = document.getElementById(containerId);
    if (!container) return;
    container.style.height = `${sortedData.length * 62}px`;
    const activeIds = [];

    sortedData.forEach((player, index) => {
        const elementId = `${containerId}_${btoa(encodeURIComponent(player.name)).replace(/=/g, "")}`;
        activeIds.push(elementId);
        let row = document.getElementById(elementId);
        if (!row) {
            row = document.createElement("div"); row.id = elementId; row.className = "grid-row";
            container.appendChild(row);
        }
        if (document.activeElement?.closest(`#${elementId}`) === null) row.innerHTML = htmlGenerator(player, index);
        row.style.transform = `translateY(${index * 62}px)`;
    });

    Array.from(container.children).forEach(el => { if (!activeIds.includes(el.id)) el.remove(); });
}

/* ================= POWER-OF-2 HYBRID TREE VISUALIZATION GENERATOR ================= */
function renderBrackets() {
    const b = getActiveBracket();
    const count = getActiveTeamCount();
    const p2Size = getNextPowerOfTwo(count);

    const pubBox = document.getElementById("publicBracket");
    const admBox = document.getElementById("adminBracket");

    // Dynamic builders
    const blockHtml = (id, label) => {
        const isBye1 = b[`${id}_t1`] === "BYE";
        const isBye2 = b[`${id}_t2`] === "BYE";
        return {
            pub: `
                <div class="matchup">
                    <div class="bracket-team"><span class="public-team-name ${isBye1?'bye-slot':''}">${b[`${id}_t1`]}</span><span class="public-score">${b[`${id}_s1`]}</span></div>
                    <div class="bracket-team"><span class="public-team-name ${isBye2?'bye-slot':''}">${b[`${id}_t2`]}</span><span class="public-score">${b[`${id}_s2`]}</span></div>
                </div>`,
            adm: `
                <div class="matchup">
                    <div class="bracket-team"><input id="b_${id}_t1" class="team-name ${isBye1?'bye-slot':''}" value="${b[`${id}_t1`]}"><input id="b_${id}_s1" class="team-score" type="number" value="${b[`${id}_s1`]}"></div>
                    <div class="bracket-team"><input id="b_${id}_t2" class="team-name ${isBye2?'bye-slot':''}" value="${b[`${id}_t2`]}"><input id="b_${id}_s2" class="team-score" type="number" value="${b[`${id}_s2`]}"></div>
                </div>`
        };
    };

    let pRound1="", aRound1="", pRound2="", aRound2="", pRound3="", aRound3="", pRound4="", aRound4="";

    // Round of 16 Tier (If needed)
    if (p2Size >= 16) {
        pRound1 += `<div class="bracket-round"><div class="bracket-round-title">Round of 16</div>`;
        aRound1 += `<div class="bracket-round"><div class="bracket-round-title">Round of 16</div>`;
        for(let i=1; i<=8; i++) {
            let chunk = blockHtml(`r1_${i}`); pRound1+=chunk.pub; aRound1+=chunk.adm;
        }
        pRound1 += `</div>`; aRound1 += `</div>`;
    }

    // Quarterfinals Tier
    if (p2Size >= 8) {
        pRound2 += `<div class="bracket-round"><div class="bracket-round-title">Quarterfinals</div>`;
        aRound2 += `<div class="bracket-round"><div class="bracket-round-title">Quarterfinals</div>`;
        for(let i=1; i<=4; i++) {
            let chunk = blockHtml(`q${i}`); pRound2+=chunk.pub; aRound2+=chunk.adm;
        }
        pRound2 += `</div>`; aRound2 += `</div>`;
    }

    // Semifinals
    let s1 = blockHtml("s1"); let s2 = blockHtml("s2");
    pRound3 = `<div class="bracket-round"><div class="bracket-round-title">Semifinals</div>${s1.pub}${s2.pub}</div>`;
    aRound3 = `<div class="bracket-round"><div class="bracket-round-title">Semifinals</div>${s1.adm}${s2.adm}</div>`;

    // Finals
    let f = blockHtml("f");
    pRound4 = `<div class="bracket-round"><div class="bracket-round-title">Grand Finals</div>${f.pub}</div>`;
    aRound4 = `<div class="bracket-round"><div class="bracket-round-title">Grand Finals</div>${f.adm}</div>`;

    pubBox.innerHTML = pRound1 + pRound2 + pRound3 + pRound4;
    if (document.activeElement?.closest(`.bracket-container`) === null) {
        admBox.innerHTML = aRound1 + aRound2 + aRound3 + aRound4;
    }
}

async function saveBracketEdits() {
    if (!databaseState.tournaments[currentTourneyId]) return;
    const p2Size = getNextPowerOfTwo(getActiveTeamCount());
    const target = {};

    const syncNode = (id) => {
        target[`${id}_t1`] = document.getElementById(`b_${id}_t1`).value;
        target[`${id}_t2`] = document.getElementById(`b_${id}_t2`).value;
        target[`${id}_s1`] = document.getElementById(`b_${id}_s1`).value;
        target[`${id}_s2`] = document.getElementById(`b_${id}_s2`).value;
    };

    syncNode("f"); syncNode("s1"); syncNode("s2");
    if (p2Size >= 8) { for(let i=1; i<=4; i++) syncNode(`q${i}`); }
    if (p2Size >= 16) { for(let i=1; i<=8; i++) syncNode(`r1_${i}`); }

    databaseState.tournaments[currentTourneyId].bracket = target;
    await saveState();
    alert("Bracket nodes synchronized!");
}

/* ================= DATA HANDLERS ================= */
async function addPlayer() {
    let name = document.getElementById("name").value.trim();
    if (!name) return alert("Enter name");
    let activePlayers = getActivePlayers();
    if (activePlayers.some(p => p.name.toLowerCase() === name.toLowerCase())) return alert("Exists");
    activePlayers.push({ name, wins: 0, losses: 0, kills: 0, deaths: 0 });
    document.getElementById("name").value = "";
    await saveState();
}
async function updatePlayer(i, field, value) {
    let p = getActivePlayers()[i]; if (!p) return;
    if (field === "name") p.name = value; else p[field] = Number(value) || 0;
    await saveState();
}
async function removePlayer(i) {
    let activePlayers = getActivePlayers();
    if (activePlayers[i] && confirm("Delete?")) { activePlayers.splice(i, 1); await saveState(); }
}

/* ================= MATRIX BACKGROUND SIMULATOR ================= */
const canvas = document.getElementById('bg-canvas'); const ctx = canvas.getContext('2d');
let width = canvas.width = window.innerWidth; let height = canvas.height = window.innerHeight;
window.addEventListener('resize', () => { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; });
const particles = [];
for (let i = 0; i < 40; i++) {
    particles.push({ x: Math.random()*width, y: Math.random()*height, radius: Math.random()*1.5+0.3, vx: (Math.random()-0.5)*0.2, vy: (Math.random()-0.5)*0.4 });
}
function animateBackground() {
    ctx.clearRect(0, 0, width, height); ctx.strokeStyle = 'rgba(231, 76, 60, 0.03)'; ctx.lineWidth = 1;
    for (let x = 0; x < width; x += 60) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,height); ctx.stroke(); }
    ctx.fillStyle = 'rgba(231, 76, 60, 0.3)';
    particles.forEach(p => {
        p.x += p.vx; p.y += p.vy; if (p.x<0 || p.x>width) p.vx*=-1; if (p.y<0 || p.y>height) p.vy*=-1;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2); ctx.fill();
    });
    requestAnimationFrame(animateBackground);
}
animateBackground();
